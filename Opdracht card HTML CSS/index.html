<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Card</title>
</head>

<body>
    <main class="container">
        <div class="card card-1">
            <img src="jongen.jpg" alt="">
            <h1>Carlo Snepvangers</h1>
            <p>Friends with Marlijn</p>
            <p class="second-parragraf">Carla requested permission to view your contact details</p>

            <button class="bt-green">Approve</button>
            <button class="bt-red">Decline</button>
        </div>
        <div class="card card-2">
            <img src="man.jpg" alt="">
            <div>
                <h1>Marion Pijneborg</h1>
                <p>New Member</p>
                <p>Marijn wants to add you to the group best friends</p>
            </div>
            <div class="div-botton">
                <button class="bt-green">Approve</button>
                <button class="bt-red">Decline</button>
            </div>
        </div>
    </main>
</body>

</html>
